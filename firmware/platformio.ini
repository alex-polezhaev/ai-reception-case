; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-n16r8]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB

build_flags = 
	; Hardware
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

    -DSERVER_BASE_URL="\"${sysenv.SERVER_URL}\""
    -DDEVICE_ID="\"${sysenv.DEVICE_ID}\""
	
	; WiFi Portal
	-DWIFI_AP_SSID=\"Ai-Reception\"
	-DWIFI_AP_PASS=\"\"
	
	; GPIO
	-DRESET_BUTTON_PIN=18
	
	; I2S Audio
	-DI2S_SAMPLE_RATE=16000
	-DI2S_BITS_PER_SAMPLE=32
	-DI2S_SD_GPIO=15
	-DI2S_WS_GPIO=16
	-DI2S_SCK_GPIO=17
	-DI2S_BUFFER_SAMPLES=256
	-DI2S_DMA_BUF_COUNT=8
	-DI2S_DMA_BUF_LEN=512

	; Debugging
	-DCORE_DEBUG_LEVEL=3
    -DARDUINO_LOG_LEVEL=3
	
	; Audio Processing
	-DAUDIO_RECORD_DURATION_SEC=60
	-DMAX_UPLOAD_RETRIES=3
	-DUPLOAD_RETRY_DELAY_MS=5000
	
	; Adaptive VAD settings
	-DADAPTIVE_VAD_ENABLED=1

	; For compatibility (not used by the new VAD)
	-DSPEECH_ENERGY_THRESHOLD=1000
	
	; Memory Management
	-DPSRAM_USAGE_PERCENT=80
	-DMIN_BUFFER_SLOTS=2
	-DMAX_BUFFER_SLOTS=10
lib_deps = 
	tzapu/WiFiManager@^2.0.17
	bblanchon/ArduinoJson@^7.4.2

monitor_speed = 115200
upload_speed = 921600