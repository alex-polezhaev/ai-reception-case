<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="840" viewBox="0 0 1240 840" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1240" height="840" fill="#f8fafc"/>

  <!-- header -->
  <text x="130" y="50" font-size="30" font-weight="700" fill="#0f172a">AI Reception — Hardware Wiring Diagram</text>
  <text x="130" y="80" font-size="16" fill="#64748b">ESP32-S3 N16R8 &#183; I2S MEMS microphone &#183; reset button &#183; USB-C power/programming</text>
  <line x1="130" y1="98" x2="1060" y2="98" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ============ CONNECTION LINES (drawn under pills, between boxes) ============ -->
  <!-- 3V3 -->
  <line x1="420" y1="188" x2="720" y2="188" stroke="#e11d48" stroke-width="2.5"/>
  <!-- GND (mic) -->
  <line x1="420" y1="230" x2="720" y2="230" stroke="#334155" stroke-width="2.5"/>
  <!-- I2S_SD GPIO15 -->
  <line x1="420" y1="272" x2="720" y2="272" stroke="#2563eb" stroke-width="2.5"/>
  <polygon points="682,267 694,272 682,277" fill="#2563eb"/>
  <!-- I2S_WS GPIO16 -->
  <line x1="420" y1="314" x2="720" y2="314" stroke="#059669" stroke-width="2.5"/>
  <polygon points="458,309 446,314 458,319" fill="#059669"/>
  <!-- I2S_SCK GPIO17 -->
  <line x1="420" y1="356" x2="720" y2="356" stroke="#7c3aed" stroke-width="2.5"/>
  <polygon points="458,351 446,356 458,361" fill="#7c3aed"/>
  <!-- RESET GPIO18 -->
  <line x1="420" y1="430" x2="720" y2="430" stroke="#d97706" stroke-width="2.5"/>
  <!-- GND (button) -->
  <line x1="420" y1="472" x2="720" y2="472" stroke="#334155" stroke-width="2.5"/>
  <!-- USB-C vertical -->
  <line x1="890" y1="570" x2="890" y2="620" stroke="#0891b2" stroke-width="2.5"/>

  <!-- ============ CONNECTION LABEL PILLS ============ -->
  <!-- 3V3 -->
  <rect x="498" y="175" width="144" height="26" rx="6" fill="#ffffff" stroke="#fecdd3"/>
  <text x="570" y="192" text-anchor="middle" font-size="13.5" font-weight="600" fill="#e11d48">3V3 &#183; Power</text>
  <!-- GND mic -->
  <rect x="534" y="217" width="72" height="26" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="570" y="234" text-anchor="middle" font-size="13.5" font-weight="600" fill="#334155">GND</text>
  <!-- SD -->
  <rect x="486" y="259" width="168" height="26" rx="6" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="570" y="276" text-anchor="middle" font-size="13.5" font-weight="600" fill="#2563eb">I2S_SD &#183; GPIO15</text>
  <!-- WS -->
  <rect x="486" y="301" width="168" height="26" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="570" y="318" text-anchor="middle" font-size="13.5" font-weight="600" fill="#059669">I2S_WS &#183; GPIO16</text>
  <!-- SCK -->
  <rect x="484" y="343" width="172" height="26" rx="6" fill="#ffffff" stroke="#ddd6fe"/>
  <text x="570" y="360" text-anchor="middle" font-size="13.5" font-weight="600" fill="#7c3aed">I2S_SCK &#183; GPIO17</text>
  <!-- RESET -->
  <rect x="476" y="417" width="188" height="26" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="570" y="434" text-anchor="middle" font-size="13.5" font-weight="600" fill="#b45309">RESET_BTN &#183; GPIO18</text>
  <!-- GND button -->
  <rect x="534" y="459" width="72" height="26" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="570" y="476" text-anchor="middle" font-size="13.5" font-weight="600" fill="#334155">GND</text>

  <!-- ============ ESP32-S3 BOX ============ -->
  <rect x="720" y="140" width="340" height="430" rx="14" fill="#ffffff" stroke="#475569" stroke-width="2" filter="url(#shadow)"/>
  <rect x="738" y="158" width="64" height="22" rx="11" fill="#475569"/>
  <text x="770" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">MCU</text>
  <text x="888" y="174" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">ESP32-S3</text>
  <text x="888" y="198" text-anchor="middle" font-size="13.5" fill="#64748b">N16R8 &#183; 16 MB flash / 8 MB OPI PSRAM</text>
  <text x="888" y="216" text-anchor="middle" font-size="12.5" fill="#94a3b8">board: 4d_systems_esp32s3_gen4_r8n16</text>

  <!-- ESP pin labels (left edge, inside) -->
  <text x="736" y="192" font-size="13.5" font-weight="600" fill="#0f172a">3V3</text>
  <text x="736" y="234" font-size="13.5" font-weight="600" fill="#0f172a">GND</text>
  <text x="736" y="276" font-size="13.5" font-weight="600" fill="#2563eb" font-family="Menlo, monospace">GPIO15</text>
  <text x="736" y="318" font-size="13.5" font-weight="600" fill="#059669" font-family="Menlo, monospace">GPIO16</text>
  <text x="736" y="360" font-size="13.5" font-weight="600" fill="#7c3aed" font-family="Menlo, monospace">GPIO17</text>
  <text x="736" y="434" font-size="13.5" font-weight="600" fill="#b45309" font-family="Menlo, monospace">GPIO18</text>
  <text x="736" y="476" font-size="13.5" font-weight="600" fill="#0f172a">GND</text>
  <!-- I2S peripheral note inside ESP -->
  <text x="824" y="276" font-size="11.5" fill="#94a3b8">I2S_NUM_0 &#183; RX master</text>
  <text x="824" y="510" font-size="11.5" fill="#94a3b8">USB native CDC on boot</text>

  <!-- ESP pin dots (left edge) -->
  <circle cx="720" cy="188" r="5" fill="#ffffff" stroke="#e11d48" stroke-width="2"/>
  <circle cx="720" cy="230" r="5" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <circle cx="720" cy="272" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="720" cy="314" r="5" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <circle cx="720" cy="356" r="5" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="720" cy="430" r="5" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <circle cx="720" cy="472" r="5" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <!-- ESP USB-C pin (bottom edge) -->
  <circle cx="890" cy="570" r="5" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>

  <!-- ============ I2S MIC BOX ============ -->
  <rect x="130" y="118" width="290" height="286" rx="14" fill="#ffffff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <rect x="148" y="130" width="58" height="22" rx="11" fill="#0ea5e9"/>
  <text x="177" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">MIC</text>
  <text x="214" y="147" font-size="16" font-weight="700" fill="#0f172a">I2S MEMS Microphone</text>
  <text x="150" y="168" font-size="11" fill="#64748b">mono / left ch. &#183; 16 kHz &#183; 32-bit slot &#183; std-I2S</text>
  <text x="150" y="182" font-size="10.5" fill="#94a3b8" font-style="italic">part representative &#8212; e.g. INMP441</text>

  <!-- mic pin labels (right edge, inside, end-anchored) -->
  <text x="404" y="192" text-anchor="end" font-size="13.5" font-weight="600" fill="#0f172a">VDD</text>
  <text x="404" y="234" text-anchor="end" font-size="13.5" font-weight="600" fill="#0f172a">GND</text>
  <text x="404" y="276" text-anchor="end" font-size="13.5" font-weight="600" fill="#2563eb">SD (DOUT)</text>
  <text x="404" y="318" text-anchor="end" font-size="13.5" font-weight="600" fill="#059669">WS (LRCL)</text>
  <text x="404" y="360" text-anchor="end" font-size="13.5" font-weight="600" fill="#7c3aed">SCK (BCLK)</text>
  <!-- mic pin dots (right edge) -->
  <circle cx="420" cy="188" r="5" fill="#ffffff" stroke="#e11d48" stroke-width="2"/>
  <circle cx="420" cy="230" r="5" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <circle cx="420" cy="272" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="420" cy="314" r="5" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <circle cx="420" cy="356" r="5" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <!-- L/R select note -->
  <line x1="150" y1="374" x2="400" y2="374" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="392" font-size="11.5" fill="#64748b">L/R</text>
  <text x="404" y="392" text-anchor="end" font-size="11.5" fill="#64748b" font-style="italic">tie to GND = left channel (representative)</text>

  <!-- ============ BUTTON BOX ============ -->
  <rect x="130" y="408" width="290" height="92" rx="14" fill="#ffffff" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <rect x="148" y="420" width="80" height="22" rx="11" fill="#d97706"/>
  <text x="188" y="435" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">BUTTON</text>
  <text x="236" y="437" font-size="15" font-weight="700" fill="#0f172a">Reset / Re-provision</text>
  <text x="236" y="458" font-size="10" fill="#64748b">SPST-NO &#183; INPUT_PULLUP, active-low</text>
  <text x="236" y="474" font-size="10" fill="#94a3b8">long-press &gt; 3 s clears Wi-Fi</text>
  <!-- button pin labels + dots (right edge) -->
  <text x="404" y="425" text-anchor="end" font-size="12.5" font-weight="600" fill="#b45309">T1</text>
  <text x="404" y="467" text-anchor="end" font-size="12.5" font-weight="600" fill="#0f172a">T2</text>
  <circle cx="420" cy="430" r="5" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <circle cx="420" cy="472" r="5" fill="#ffffff" stroke="#334155" stroke-width="2"/>

  <!-- ============ USB-C BOX ============ -->
  <rect x="785" y="620" width="210" height="74" rx="14" fill="#ffffff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="803" y="632" width="64" height="22" rx="11" fill="#0891b2"/>
  <text x="835" y="647" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">POWER</text>
  <text x="980" y="650" text-anchor="end" font-size="17" font-weight="700" fill="#0f172a">USB-C</text>
  <text x="980" y="672" text-anchor="end" font-size="12" fill="#64748b">5 V supply + native USB</text>
  <text x="980" y="687" text-anchor="end" font-size="12" fill="#64748b">CDC programming / flash</text>
  <circle cx="890" cy="620" r="5" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>

  <!-- ============ LEGEND & NOTES ============ -->
  <rect x="130" y="546" width="600" height="172" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="150" y="572" font-size="14" font-weight="700" fill="#0f172a">Legend &amp; Notes</text>

  <!-- swatches row 1 -->
  <rect x="150" y="588" width="13" height="13" rx="3" fill="#e11d48"/>
  <text x="170" y="599" font-size="12" fill="#334155">3V3 power</text>
  <rect x="258" y="588" width="13" height="13" rx="3" fill="#334155"/>
  <text x="278" y="599" font-size="12" fill="#334155">GND</text>
  <rect x="340" y="588" width="13" height="13" rx="3" fill="#2563eb"/>
  <text x="360" y="599" font-size="12" fill="#334155">I2S_SD</text>
  <rect x="438" y="588" width="13" height="13" rx="3" fill="#059669"/>
  <text x="458" y="599" font-size="12" fill="#334155">I2S_WS</text>
  <rect x="538" y="588" width="13" height="13" rx="3" fill="#7c3aed"/>
  <text x="558" y="599" font-size="12" fill="#334155">I2S_SCK</text>
  <!-- swatches row 2 -->
  <rect x="150" y="610" width="13" height="13" rx="3" fill="#d97706"/>
  <text x="170" y="621" font-size="12" fill="#334155">RESET button</text>
  <rect x="280" y="610" width="13" height="13" rx="3" fill="#0891b2"/>
  <text x="300" y="621" font-size="12" fill="#334155">USB-C power</text>
  <polygon points="430,611 442,617 430,623" fill="#64748b"/>
  <text x="450" y="621" font-size="12" fill="#334155">&#8594; signal direction (master drives WS/SCK)</text>

  <line x1="150" y1="636" x2="710" y2="636" stroke="#f1f5f9" stroke-width="1.5"/>
  <text x="150" y="654" font-size="11.5" fill="#475569">Pins from firmware/platformio.ini build_flags &#8212; confirmed in src/i2s/i2s_mic.cpp &amp; src/main.cpp.</text>
  <text x="150" y="671" font-size="11.5" fill="#475569">Button: long-press &gt; 3 s clears Wi-Fi &amp; reboots. Mic VDD/GND = 3V3 rail.</text>
  <text x="150" y="688" font-size="11.5" fill="#475569"><tspan font-weight="700" fill="#b91c1c">microSD / SPI: NOT USED</tspan> &#8212; no SD-card code exists in the firmware.</text>
  <text x="150" y="705" font-size="11.5" fill="#475569"><tspan font-style="italic">Representative</tspan> = not pinned by repo: mic part, L/R-select pin, USB PSU.</text>
</svg>
