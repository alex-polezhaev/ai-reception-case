server {
    listen 80;
    server_name core.your-domain.example;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name mini-app.your-domain.example;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name core.your-domain.example;

    ssl_certificate /etc/nginx/certs/core.your-domain.crt;
    ssl_certificate_key /etc/nginx/certs/core.your-domain.key;

    client_max_body_size 50M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Device routes - high priority
    location /device/ {
        proxy_pass http://api_server:8080/device/;
    }


}

server {
    listen 443 ssl;
    server_name mini-app.your-domain.example;

    ssl_certificate /etc/nginx/certs/mini-app.your-domain.crt;
    ssl_certificate_key /etc/nginx/certs/mini-app.your-domain.key;

    client_max_body_size 50M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # MiniApp routes
    location / {
        proxy_pass http://mini_app:8081/;
    }
}
