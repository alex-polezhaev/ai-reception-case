services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data
    command: -H unix:///var/run/docker.sock
    networks:
      - ai-reception-net

networks:
  ai-reception-net:
    external: true
